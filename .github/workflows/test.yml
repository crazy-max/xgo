name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - "1.25.1"
          - "1.24.7"
        case:
          - c
          - cpp
          - gorm
          - ffmerger
    steps:
      -
        name: Build xgo
        uses: docker/bake-action@v7
        with:
          targets: image
          set: |
            *.tags=xgo:${{ matrix.go_version }}
            *.args.GO_VERSION=${{ matrix.go_version }}
            *.output=type=docker
            *.cache-from=type=gha,scope=go-${{ matrix.go_version }}-linux-amd64
      -
        name: Test ${{ matrix.case }} for go ${{ matrix.go_version }}
        uses: docker/bake-action@v7
        with:
          targets: test-${{ matrix.case }}
        env:
          BASE_IMAGE: xgo:${{ matrix.go_version }}
