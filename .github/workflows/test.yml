name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go_version:
          - 1.25.10
          - 1.26.3
        case:
          - c
          - cpp
          - foundation
          - gopath
          - gorm
          - ffmerger
    steps:
      -
        name: Build xgo
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: image
          set: |
            *.tags=xgo:${{ matrix.go_version }}
            *.args.GO_VERSION=${{ matrix.go_version }}
            *.output=type=docker
            *.cache-from=type=gha,scope=go-${{ matrix.go_version }}-linux-amd64
      -
        name: Test ${{ matrix.case }} for go ${{ matrix.go_version }}
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: test-${{ matrix.case }}
        env:
          BASE_IMAGE: xgo:${{ matrix.go_version }}
